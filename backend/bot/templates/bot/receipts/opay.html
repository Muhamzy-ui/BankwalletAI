<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPay</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #F7F8FA; font-family: 'Roboto', sans-serif; width: 450px; height: 950px; }
        .hero { background-color: #00A86B; padding: 40px 20px 60px; text-align: center; color: white;}
        .title { font-size: 24px; font-weight: 700; margin-bottom: 20px;}
        .amount { font-size: 40px; font-weight: 700; margin-bottom: 10px;}
        .status { font-size: 16px; display: inline-flex; align-items: center; gap:5px; background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 20px;}
        
        .card { background-color: white; border-radius: 16px; margin: -30px 20px 20px; padding: 30px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);}
        .row { display: flex; justify-content: space-between; padding: 20px 0; border-bottom: 1px dashed #eee;}
        .row:last-child { border-bottom: none;}
        .label { color: #8e95a5; font-size: 15px;}
        .val { color: #222; font-size: 15px; font-weight: 500; text-align: right;}
    </style>
</head>
<body>
    <div class="hero">
        <div class="title">OPay</div>
        <div class="amount">{{ amount }}</div>
        <div class="status">
            <svg width="18" height="18" fill="white" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg> 
            Successful
        </div>
    </div>

    <div class="card">
        <div class="row">
            <div class="label">Transaction Date</div>
            <div class="val">{{ date }}</div>
        </div>
        <div class="row">
            <div class="label">Sender</div>
            <div class="val">{{ sender }}</div>
        </div>
        <div class="row">
            <div class="label">Recipient</div>
            <div class="val">{{ receiver }}</div>
        </div>
        <div class="row">
            <div class="label">Bank</div>
            <div class="val">{{ bank }}</div>
        </div>
        <div class="row">
            <div class="label">Transaction Type</div>
            <div class="val">Bank Transfer</div>
        </div>
        <div class="row">
            <div class="label">Transaction No</div>
            <div class="val" style="font-family: monospace;">{{ txn_id }}</div>
        </div>
        <div class="row">
            <div class="label">Session ID</div>
            <div class="val" style="font-family: monospace;">{{ session_id }}</div>
        </div>
    </div>
</body>
</html>
