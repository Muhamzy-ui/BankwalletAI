<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sparkle Receipt</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #FFFFFF; font-family: 'Inter', sans-serif; width: 450px; height: 950px; color: #1a1d59;}
        .header { display: flex; align-items: center; padding: 25px 20px; font-size: 16px; font-weight: 600;}
        .header svg { width: 20px; height: 20px; margin-right: 15px;}
        
        .logo-box { text-align: center; margin-top: 40px;}
        .logo-box img { height: 45px;}
        .logo-text { font-size: 40px; font-weight: 700; letter-spacing: -1px; display: inline-flex; align-items: center; justify-content: center;}
        .sparkle-icon { background: linear-gradient(135deg, #7cc949 0%, #a2d64a 100%); width: 35px; height: 35px; display: inline-block; margin-right: 15px; position:relative;}
        .sparkle-icon::before { content: ""; position: absolute; top:5px; left:5px; right:5px; bottom:5px; background: white; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);}
        
        .title { text-align: center; color: #1a1d59; font-size: 24px; font-weight: 700; margin-top: 40px; margin-bottom: 20px;}
        
        .content { margin: 0 40px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 25px 0; border-bottom: 1px solid #f2f2f2;}
        .row:last-child { border-bottom: none;}
        .label { color: #8e95a5; font-size: 14px;}
        .val { color: #1a1d59; font-size: 14px; font-weight: 600; text-align: right; line-height: 1.5; max-width: 200px;}
        
        .footer { text-align: center; position: absolute; bottom: 40px; width: 100%; color: #1a1d59; font-weight: 600; font-size: 14px;}
    </style>
</head>
<body>
    <div class="header">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Sparkle Receipt
    </div>

    <div class="logo-box">
        <div class="logo-text">
            <div class="sparkle-icon"></div>
            <span style="color: #7cc949;">sp</span><span style="color: #fbba00;">arkle</span>
        </div>
    </div>
    
    <div class="title">Payment Summary</div>

    <div class="content">
        <div class="row">
            <div class="label">Type</div>
            <div class="val">Received Money</div>
        </div>
        <div class="row">
            <div class="label">Date & Time</div>
            <div class="val">{{ date_full }}</div>
        </div>
        <div class="row">
            <div class="label">Sender</div>
            <div class="val">{{ sender }} -<br>100****107</div>
        </div>
        <div class="row">
            <div class="label">Recipient</div>
            <div class="val">{{ receiver }}</div>
        </div>
        <div class="row">
            <div class="label">Amount</div>
            <div class="val" style="font-size: 16px; font-weight: 700;">+{{ amount }}</div>
        </div>
        <div class="row">
            <div class="label">Session ID</div>
            <div class="val" style="word-break: break-all;">{{ session_id }}</div>
        </div>
        <div class="row">
            <div class="label">Comment</div>
            <div class="val">Sent from {{ sender }}</div>
        </div>
    </div>

    <div class="footer">... Freedom Trust Tribe</div>
</body>
</html>
